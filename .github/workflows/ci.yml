name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shellcheck:
    name: shellcheck (install.sh, uninstall.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck --severity=warning install.sh uninstall.sh

  psscriptanalyzer:
    name: PSScriptAnalyzer (install.ps1, uninstall.ps1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path install.ps1,uninstall.ps1 `
            -Severity Warning,Error
          if ($results) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer reported $($results.Count) issue(s)"
            exit 1
          }
          Write-Host "PSScriptAnalyzer: clean"

  install-dryrun:
    name: install.sh smoke test (skip-engram)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run installer against a fresh workdir
        run: |
          mkdir -p /tmp/test-install && cd /tmp/test-install
          # Local script path, but the script fetches AGENTS.md from GitHub main.
          # --skip-engram keeps this hermetic (no pip write).
          bash "$GITHUB_WORKSPACE/install.sh" --skip-engram --force
          test -f AGENTS.md
          test -f CLAUDE.md
          grep -q '^@AGENTS.md$' CLAUDE.md
          test -d .agents/skills/brainstorming
          test -d .claude/skills/brainstorming
          test -d .agents/skills/review
          echo "install.sh smoke test OK"
